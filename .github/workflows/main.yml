name: Anti-Zaglushka Smart Sync 111

on:
  schedule:
    - cron: "0 */1 * * *"
  workflow_dispatch:

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Fetch and Merge
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          # 1. Настройки
          SOURCE="https://raw.githubusercontent.com/zieng2/wl/main/vless_lite.txt"
          FLAGS=("🇺🇸" "🇩🇪" "🇫🇮" "🇵🇱" "🇳🇱" "🇬🇧" "🇫🇷" "🇰🇿" "🇹🇷" "🇸🇪" "🇦🇹" "🇨🇿")
          LIMIT=111

          # 2. Сохраняем твои текущие сервера (VIP)
          touch README.md
          grep -E "^(vless|vmess|ss|trojan)://" README.md | grep -v "Антизаглушка" > my_vip.txt || touch my_vip.txt

          # 3. Скачиваем новые ключи
          curl -L -s "$SOURCE" -o incoming.txt
          grep -E "^(vless|vmess|ss|trojan)://" incoming.txt | cut -d'#' -f1 | head -n $LIMIT > source_cleaned.txt

          # 4. Собираем новый README.md с твоими данными
          echo "#subscription-userinfo: upload=1; download=1; total=1; expire=999999999999999" > README.md
          echo "#profile-title: Sulim vpn 🏎️" >> README.md
          echo "#profile-update-interval: 1" >> README.md
          echo "#subscription-update-interval: 1" >> README.md
          echo "#announce: Если VPN не работает нажмите 🔄 , после ⏱️ и выберите сервер с наименьшим показателем ms!" >> README.md
          echo "#support-url: https://wa.me/79639864491" >> README.md
          echo "#profile-web-page-url: https://wa.me/79639864491" >> README.md
          echo "happ://routing/bypass-lan-and-cn?name=Bypass+LAN+and+CN" >> README.md
          echo "" >> README.md

          # Вставляем твои VIP сервера
          cat my_vip.txt >> README.md

          # Вставляем 111 новых серверов
          IDX=1
          while IFS= read -r line; do
            RANDOM_FLAG=${FLAGS[$RANDOM % ${#FLAGS[@]}]}
            echo "${line}#${RANDOM_FLAG} anti-hwb 🔗 $IDX" >> README.md
            IDX=$((IDX + 1))
          done < source_cleaned.txt

          # 5. Отчет в Telegram
          if [[ -n "$TG_TOKEN" ]]; then
            TOTAL=$(grep -c "://" README.md)
            MSG="⚔️ *АНТИЗАГЛУШКА ОБНОВЛЕНА*%0A%0A📊 Всего серверов: *$TOTAL*%0A🕒 Время: $(date +'%H:%M')"
            curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" -d "chat_id=$TG_CHAT_ID" -d "parse_mode=Markdown" -d "text=$MSG"
          fi

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Github Action"
          git add README.md
          git commit -m "Updated with support links and 111 keys ⚔️" || exit 0
          git push origin main
